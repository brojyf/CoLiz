services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: prod.env
    volumes:
      - ./storage/data/mysql:/var/lib/mysql:z
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro,z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./storage/data/redis:/data:z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - prod.env
      - runtime/rotation.env
    volumes:
      - ./storage:/app/storage:z
      - ./runtime:/app/runtime:z
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file:
      - prod.env
      - runtime/rotation.env
    volumes:
      - ./runtime:/app/runtime:z
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  dlq_cleaner:
    build:
      context: .
      target: dlq_cleaner
    restart: unless-stopped
    env_file: prod.env
    depends_on:
      mysql:
        condition: service_healthy

  rotation:
    build:
      context: .
      target: rotation
    volumes:
      - ./runtime:/app/runtime:z
    profiles:
      - rotation
